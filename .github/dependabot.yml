version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: ci

  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
      - nuget
    commit-message:
      prefix: deps
    allow:
      - dependency-type: all
    ignore:
      - dependency-name: '*'
        update-types:
          - version-update:semver-major
