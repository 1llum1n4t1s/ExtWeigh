# PR / push ごとのビルド + ユニットテスト（統合テストは実 Chrome が必要なため除外）
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: windows-2022
    steps:
      - name: チェックアウト
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: .NET SDK セットアップ
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: 10.0.x

      - name: 復元
        run: dotnet restore ExtWeigh.slnx -r win-x64 -p:Configuration=Release

      - name: ビルド
        run: dotnet build ExtWeigh.slnx -c Release --no-restore

      - name: ユニットテスト
        run: dotnet test src/ExtWeigh.Tests -c Release --no-build --filter "TestCategory!=Integration"
