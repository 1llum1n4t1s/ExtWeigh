name: CodeQL Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 3 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: C# CodeQL
    runs-on: windows-2022
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: .NET SDK をセットアップ
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: 10.0.x

      - name: CodeQL を初期化
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.35.3
        with:
          languages: csharp
          build-mode: manual

      - name: 復元
        run: dotnet restore ExtWeigh.slnx -r win-x64 -p:Configuration=Release --locked-mode

      - name: ビルド
        run: dotnet build ExtWeigh.slnx -c Release --no-restore

      - name: CodeQL 解析を実行
        uses: github/codeql-action/analyze@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.35.3
        with:
          category: /language:csharp
