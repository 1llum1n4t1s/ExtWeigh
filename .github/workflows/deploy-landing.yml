name: Deploy Landing Page

# website/ 配下のランディングページを Cloudflare Worker としてデプロイする。
# ローカル署名による Velopack / R2 リリースとは独立した公開経路。
on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - '.github/workflows/deploy-landing.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: extweigh-landing
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy landing Worker
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Node.js をセットアップ
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'

      - name: Wrangler をインストール
        run: npm install -g wrangler@4.112.0

      - name: Worker を検証
        working-directory: website
        run: wrangler deploy --dry-run --outdir .wrangler-dry-run

      # CLOUDFLARE_API_TOKEN には Workers Scripts:Edit が必要。
      - name: Worker をデプロイ
        working-directory: website
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler deploy
